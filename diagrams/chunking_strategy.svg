<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow5" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="16" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Sliding Window Chunking Strategy</text>

  <!-- Original text bar -->
  <rect x="60" y="55" width="680" height="40" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Original Document Text (2000 characters)</text>

  <!-- Position markers -->
  <line x1="60" y1="95" x2="60" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <text x="60" y="125" text-anchor="middle" font-size="11" fill="#64748b">0</text>

  <line x1="294" y1="95" x2="294" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <text x="294" y="125" text-anchor="middle" font-size="11" fill="#64748b">650</text>

  <line x1="430" y1="95" x2="430" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <text x="430" y="125" text-anchor="middle" font-size="11" fill="#64748b">800</text>

  <line x1="566" y1="95" x2="566" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <text x="566" y="125" text-anchor="middle" font-size="11" fill="#64748b">1300</text>

  <line x1="626" y1="95" x2="626" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <text x="626" y="125" text-anchor="middle" font-size="11" fill="#64748b">1450</text>

  <line x1="740" y1="95" x2="740" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <text x="740" y="125" text-anchor="middle" font-size="11" fill="#64748b">2000</text>

  <!-- Chunk 1 -->
  <rect x="60" y="145" width="370" height="50" rx="8" fill="#3b82f6" filter="url(#shadow5)"/>
  <text x="245" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="white">Chunk 1: 0 - 799 (800 chars)</text>
  <text x="245" y="186" text-anchor="middle" font-size="10" fill="#dbeafe">First segment of the document</text>

  <!-- Chunk 2 -->
  <rect x="294" y="205" width="332" height="50" rx="8" fill="#8b5cf6" filter="url(#shadow5)"/>
  <text x="460" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="white">Chunk 2: 650 - 1449 (800 chars)</text>
  <text x="460" y="246" text-anchor="middle" font-size="10" fill="#ede9fe">Overlaps with Chunk 1 and Chunk 3</text>

  <!-- Chunk 3 -->
  <rect x="566" y="265" width="174" height="50" rx="8" fill="#10b981" filter="url(#shadow5)"/>
  <text x="653" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="white">Chunk 3: 1300 - End</text>
  <text x="653" y="306" text-anchor="middle" font-size="10" fill="#d1fae5">Remaining text (700 chars)</text>

  <!-- Overlap annotations -->
  <!-- Overlap 1-2 -->
  <path d="M 294 145 Q 294 130 294 120" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 430 145 Q 430 130 430 120" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <line x1="294" y1="120" x2="430" y2="120" stroke="#f59e0b" stroke-width="2"/>
  <text x="362" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">150 char overlap</text>

  <!-- Overlap 2-3 -->
  <path d="M 566 205 Q 566 190 566 180" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 626 205 Q 626 190 626 180" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <line x1="566" y1="180" x2="626" y2="180" stroke="#f59e0b" stroke-width="2"/>
  <text x="596" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">150 overlap</text>

  <!-- Parameters box -->
  <rect x="60" y="215" width="200" height="85" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5"/>
  <text x="160" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">Parameters</text>
  <text x="80" y="258" font-size="11" fill="#713f12">CHUNK_SIZE = 800</text>
  <text x="80" y="275" font-size="11" fill="#713f12">OVERLAP = 150</text>
  <text x="80" y="292" font-size="11" fill="#713f12">MIN_CHUNK = 50</text>
</svg>
