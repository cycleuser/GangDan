<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">RAG Pipeline: Document to Retrieval</text>

  <!-- Pipeline steps -->
  <!-- Step 1: Document Ingestion -->
  <rect x="40" y="80" width="130" height="100" rx="10" fill="url(#step1)" filter="url(#shadow2)"/>
  <text x="105" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="white">Document</text>
  <text x="105" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="white">Ingestion</text>
  <text x="105" y="160" text-anchor="middle" font-size="10" fill="#dbeafe">.rst .py .html</text>
  <text x="105" y="172" text-anchor="middle" font-size="10" fill="#dbeafe">.cpp .md</text>

  <!-- Arrow 1-2 -->
  <line x1="170" y1="130" x2="210" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 2: Format Conversion -->
  <rect x="210" y="80" width="130" height="100" rx="10" fill="url(#step2)" filter="url(#shadow2)"/>
  <text x="275" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="white">Format</text>
  <text x="275" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="white">Conversion</text>
  <text x="275" y="160" text-anchor="middle" font-size="10" fill="#ede9fe">rst→md, py→code</text>
  <text x="275" y="172" text-anchor="middle" font-size="10" fill="#ede9fe">html→md</text>

  <!-- Arrow 2-3 -->
  <line x1="340" y1="130" x2="380" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 3: Text Chunking -->
  <rect x="380" y="80" width="130" height="100" rx="10" fill="url(#step3)" filter="url(#shadow2)"/>
  <text x="445" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="white">Text</text>
  <text x="445" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="white">Chunking</text>
  <text x="445" y="160" text-anchor="middle" font-size="10" fill="#cffafe">size=800</text>
  <text x="445" y="172" text-anchor="middle" font-size="10" fill="#cffafe">overlap=150</text>

  <!-- Arrow 3-4 -->
  <line x1="510" y1="130" x2="550" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 4: Vector Embedding -->
  <rect x="550" y="80" width="130" height="100" rx="10" fill="url(#step4)" filter="url(#shadow2)"/>
  <text x="615" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="white">Vector</text>
  <text x="615" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="white">Embedding</text>
  <text x="615" y="160" text-anchor="middle" font-size="10" fill="#d1fae5">nomic-embed-text</text>
  <text x="615" y="172" text-anchor="middle" font-size="10" fill="#d1fae5">768-dim vectors</text>

  <!-- Arrow 4-5 -->
  <line x1="680" y1="130" x2="720" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 5: Vector Storage -->
  <rect x="720" y="80" width="60" height="100" rx="10" fill="url(#step5)" filter="url(#shadow2)"/>
  <text x="750" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="white">Vector</text>
  <text x="750" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="white">Storage</text>
  <text x="750" y="162" text-anchor="middle" font-size="9" fill="#fef3c7">ChromaDB</text>

  <!-- Retrieval Section -->
  <rect x="40" y="230" width="720" height="150" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="400" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#0d9488">Query Retrieval Flow</text>

  <!-- Query box -->
  <rect x="60" y="275" width="140" height="40" rx="8" fill="#3b82f6" filter="url(#shadow2)"/>
  <text x="130" y="300" text-anchor="middle" font-size="13" font-weight="500" fill="white">User Query</text>

  <!-- Arrow -->
  <line x1="200" y1="295" x2="240" y2="295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Embed box -->
  <rect x="240" y="275" width="120" height="40" rx="8" fill="#06b6d4" filter="url(#shadow2)"/>
  <text x="300" y="300" text-anchor="middle" font-size="13" font-weight="500" fill="white">Embed Query</text>

  <!-- Arrow -->
  <line x1="360" y1="295" x2="400" y2="295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Search box -->
  <rect x="400" y="275" width="120" height="40" rx="8" fill="#10b981" filter="url(#shadow2)"/>
  <text x="460" y="300" text-anchor="middle" font-size="13" font-weight="500" fill="white">Top-K Search</text>

  <!-- Arrow -->
  <line x1="520" y1="295" x2="560" y2="295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Filter box -->
  <rect x="560" y="275" width="100" height="40" rx="8" fill="#f59e0b" filter="url(#shadow2)"/>
  <text x="610" y="300" text-anchor="middle" font-size="13" font-weight="500" fill="white">Filter &amp; Dedup</text>

  <!-- Arrow -->
  <line x1="660" y1="295" x2="700" y2="295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Context box -->
  <rect x="700" y="275" width="50" height="40" rx="8" fill="#8b5cf6" filter="url(#shadow2)"/>
  <text x="725" y="300" text-anchor="middle" font-size="11" font-weight="500" fill="white">Context</text>

  <!-- Bottom: LLM Generation -->
  <line x1="725" y1="315" x2="725" y2="345" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="580" y="345" width="180" height="40" rx="8" fill="#ec4899" filter="url(#shadow2)"/>
  <text x="670" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="white">LLM Generation</text>

  <!-- Feedback arrow -->
  <path d="M 580 365 Q 400 390 130 340" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="350" y="390" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Response to user</text>
</svg>
